    <meta charset="UTF-8" />

    <title>شركة الوعل للمقاولات والعقارات</title>
    <meta name="description" content="شركة الوعل للعقارات والمقاولات، خبرة تمتد لأكثر من 25 عاماً في البناء والتطوير العقاري." />

    <meta property="og:title" content="شركة الوعل للمقاولات والعقارات" />
    <meta property="og:description" content="خبرة تمتد لأكثر من 25 عاماً في البناء والتطوير العقاري." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://24nse.github.io/alwael_website/og-image.jpg" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://24nse.github.io/alwael_website/og-image.jpg" />

    <!--
      SPA GitHub Pages Redirect — based on the spa-github-pages technique by Rafael Pedicini
      https://github.com/rafgraph/spa-github-pages

      How it works:
      1. GitHub Pages serves this 404.html for any path that doesn't match a real file.
      2. This script encodes the full path (minus the repo basename) into a query string.
      3. It then redirects to the root index.html with that query string.
      4. index.html reads the query string and restores the correct URL using history.replaceState.

      The `pathSegmentsToKeep` value controls how many path segments from the base URL
      to preserve. For project pages (e.g., https://user.github.io/repo/), use 1.
      For custom domains (e.g., https://alwael.com/), use 0.
    -->
    <script>
      (function () {
        var pathSegmentsToKeep = 1; // 1 for GitHub Pages project repo (/alwael_website)

        var l = window.location;

        // Encode the path, query, and hash into a redirect query string
        // e.g., /alwael_website/about?foo=bar#section
        // becomes: /alwael_website/?p=/about&q=foo%3Dbar&h=section
        l.replace(
          l.protocol +
            '//' +
            l.hostname +
            (l.port ? ':' + l.port : '') +
            l.pathname
              .split('/')
              .slice(0, 1 + pathSegmentsToKeep)
              .join('/') +
            '/?p=' +
            l.pathname
              .slice(1)
              .split('/')
              .slice(pathSegmentsToKeep)
              .join('/')
              .replace(/&/g, '~and~') +
            (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
            (l.hash ? '&h=' + l.hash.slice(1) : '')
        );
      })();
    </script>
  </head>

  <body>
    <!-- Page is intentionally blank — JS redirect happens in <head> before body renders -->
  </body>
</html>
